# Gruvbox Material
# Theme adapted for Gruvbox Material color scheme
# Original theme created by: https://github.com/yorukot
# Updated for Gruvbox Material by Claude
#
# Thanks for all contributors!!
# If you want to make border display just set it same as sidebar background color
# Code syntax highlight theme (you can go to https://github.com/alecthomas/chroma/blob/master/styles to find one you like)
code_syntax_highlight = "gruvbox"

# ========= Border =========
file_panel_border = "#5a524c"
sidebar_border = "#282828"
footer_border = "#5a524c"

# ========= Border Active =========
file_panel_border_active = "#ddc7a1"
sidebar_border_active = "#d8a657"
footer_border_active = "#d8a657"
modal_border_active = "#5a524c"

# ========= Background (bg) =========
full_screen_bg = "#1d2021"
file_panel_bg = "#282828"
sidebar_bg = "#282828"
footer_bg = "#282828"
modal_bg = "#32302f"

# ========= Foreground (fg) =========
full_screen_fg = "#d4be98"
file_panel_fg = "#d4be98"
sidebar_fg = "#d4be98"
footer_fg = "#d4be98"
modal_fg = "#d4be98"

# ========= Special Color =========
cursor = "#89b482"
correct = "#a9b665"
error = "#ea6962"
hint = "#7daea3"
cancel = "#a89984"
# Gradient color can only have two color!
gradient_color = ["#89b482", "#ea6962"]

# ========= File Panel Special Items =========
file_panel_top_directory_icon = "#89b482"
file_panel_top_path = "#7daea3"
file_panel_item_selected_fg = "#d3869b"
file_panel_item_selected_bg = "#32302f"

# ========= Sidebar Special Items =========
sidebar_title = "#ea6962"
sidebar_item_selected_fg = "#e78a4e"
sidebar_item_selected_bg = "#32302f"
sidebar_divider = "#5a524c"

# ========= Modal Special Items =========
modal_cancel_fg = "#d4be98"
modal_cancel_bg = "#665c54"
modal_confirm_fg = "#d4be98"
modal_confirm_bg = "#e78a4e"

# ========= Help Menu =========
help_menu_hotkey = "#89b482"
help_menu_title = "#e78a4e"
